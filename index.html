<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CLYD Budget Pro</title>
    <link rel="apple-touch-icon" href="icon-512.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="manifest" href="manifest.json">
    <style>
        :root {
            --primary-color: #2F58E8;
            --bg-color: #F6F8FA;
            --card-bg: #FFFFFF;
            --text-main: #1C1F2E;
            --text-muted: #8A8D9F;
            --success: #21C063;
            --danger: #FF5A5F;
            --border-radius-lg: 24px;
            --border-radius-md: 16px;
            --shadow-soft: 0 8px 24px rgba(149, 157, 165, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); max-width: 480px; margin: 0 auto; min-height: 100vh; position: relative; }

        /* Header */
        .app-header { display: flex; justify-content: space-between; align-items: center; padding: 24px 20px; }
        .profile-icon { width: 40px; height: 40px; background: var(--card-bg); border-radius: 50%; display: flex; justify-content: center; align-items: center; box-shadow: var(--shadow-soft); color: var(--primary-color); cursor: pointer; }

        /* Cards */
        .app-content { padding: 0 20px 100px; }
        .balance-card {
            background: linear-gradient(135deg, var(--primary-color) 0%, #5275F0 100%);
            border-radius: var(--border-radius-lg);
            padding: 24px; color: white; box-shadow: 0 10px 20px rgba(47, 88, 232, 0.3); margin-bottom: 24px;
        }
        .balance-card h2 { font-size: 32px; margin: 8px 0 20px; }
        .balance-details { display: flex; justify-content: space-between; border-top: 1px solid rgba(255,255,255,0.2); padding-top: 15px; }

        /* List & Items */
        .section-header { display: flex; justify-content: space-between; align-items: center; margin: 20px 0 15px; }
        .transaction-item { 
            display: flex; align-items: center; background: var(--card-bg); padding: 15px; 
            border-radius: var(--border-radius-md); box-shadow: var(--shadow-soft); margin-bottom: 10px;
        }
        .t-icon { width: 40px; height: 40px; border-radius: 12px; display: flex; justify-content: center; align-items: center; margin-right: 12px; background: #f0f2f5; color: var(--primary-color); }
        .t-info { flex: 1; }
        .t-info h4 { font-size: 15px; }
        .t-info p { font-size: 12px; color: var(--text-muted); }
        .t-amount { font-weight: 700; text-align: right; }
        .expense { color: var(--danger); }
        .income { color: var(--success); }

        /* Recherche & Filtres */
        .search-box {
            width: 100%; padding: 12px 15px; border-radius: 12px; border: 1px solid #ddd;
            margin-bottom: 20px; background: white; outline: none;
        }

        /* Budget Alert (Fonctionnalité 2) */
        .budget-alert { font-size: 11px; font-weight: 700; color: var(--danger); margin-top: 4px; display: flex; align-items: center; gap: 4px; }

        /* Actions buttons */
        .t-actions { display: flex; gap: 10px; margin-top: 5px; justify-content: flex-end; }
        .t-actions i { cursor: pointer; font-size: 14px; opacity: 0.6; }
        .t-actions i:hover { opacity: 1; }

        /* UI Elements */
        .chart-container { background: var(--card-bg); border-radius: var(--border-radius-lg); padding: 15px; height: 180px; margin-bottom: 20px; }
        .fab-add { position: fixed; bottom: 30px; right: 20px; width: 56px; height: 56px; background: var(--primary-color); color: white; border: none; border-radius: 50%; font-size: 24px; box-shadow: 0 8px 20px rgba(47, 88, 232, 0.4); z-index: 100; }
        
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; align-items: flex-end; z-index: 1000; }
        .modal-content { background: white; width: 100%; padding: 25px; border-radius: 24px 24px 0 0; animation: slideUp 0.3s; }
        .form-group { margin-bottom: 15px; }
        .form-group input, .form-group select { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #eee; margin-top: 5px; }
        .btn-submit { width: 100%; padding: 15px; background: var(--primary-color); color: white; border: none; border-radius: 12px; font-weight: 600; cursor: pointer; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    </style>
</head>
<body>

    <header class="app-header">
        <div><p style="color:var(--text-muted); font-size:14px;">Total Budget</p><h1>Tableau de bord</h1></div>
        <div class="profile-icon" onclick="clearAllData()"><i class="fa-solid fa-trash-can"></i></div>
    </header>

    <main class="app-content">
        <div id="page-home" class="app-page">
            <div class="balance-card">
                <p>Mon Solde</p><h2 id="total-balance">0 CFA</h2>
                <div class="balance-details">
                    <div><p style="font-size:12px;opacity:0.8;">Revenus</p><h4 id="total-income">0 CFA</h4></div>
                    <div><p style="font-size:12px;opacity:0.8;">Dépenses</p><h4 id="total-expense" style="color:#FFC0C0;">0 CFA</h4></div>
                </div>
            </div>
            <div class="section-header"><h3>Analyse Dépenses</h3></div>
            <div class="chart-container"><canvas id="budgetChart"></canvas></div>
            <div class="section-header"><h3>Activités</h3><span style="color:var(--primary-color); cursor:pointer;" onclick="showPage('history')">Voir tout</span></div>
            <div id="transaction-list"></div>
        </div>

        <div id="page-history" class="app-page" style="display:none;">
            <div class="section-header">
                <i class="fa-solid fa-arrow-left" onclick="showPage('home')"></i>
                <h3>Historique & Recherche</h3>
            </div>
            <input type="text" id="search-input" class="search-box" placeholder="Rechercher (ex: burger, salaire...)">
            <div id="full-history-list"></div>
        </div>
    </main>

    <button class="fab-add" onclick="document.getElementById('add-modal').style.display='flex'"><i class="fa-solid fa-plus"></i></button>

    <div id="add-modal" class="modal">
        <div class="modal-content">
            <h3>Ajouter une opération</h3>
            <form id="transaction-form">
                <div class="form-group"><label>Type</label><select id="t-type"><option value="depense">Dépense</option><option value="revenu">Revenu</option><option value="revenu">épargne</option></select></div>
                <div class="form-group"><label>Montant (CFA)</label><input type="number" id="t-amount" required></div>
                <div class="form-group">
  <label>Catégorie</label>
  <select id="t-category">
    <option value="Ventes">Ventes</option>
    <option value="Services">Services</option>
    <option value="Achats">Achats</option>
    <option value="Salaires">Salaires</option>
    <option value="Loyer">Loyer</option>
    <option value="Factures">Factures</option>
    <option value="Transport">Transport</option>
    <option value="Marketing">Marketing</option>
    <option value="Équipement">Équipement</option>
      <option value="Équipement">Épargnet</option>
    <option value="Divers">Divers</option>
  </select>
</div>
                <div class="form-group"><label>Description</label><input type="text" id="t-desc" required></div>
                <button type="submit" class="btn-submit">Valider</button>
                <button type="button" onclick="document.getElementById('add-modal').style.display='none'" style="width:100%; background:none; border:none; margin-top:10px; color:var(--text-muted);">Annuler</button>
            </form>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
